<!DOCTYPE html>
<html>

<head>

<title>Smart Expense Tracker</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

</head>

<body class="bg-light">

<div class="container mt-5">

<h1 class="text-center mb-4">Smart Expense Tracker</h1>

<div class="card p-4 shadow">

<h4>Add Expense</h4>

<form id="expenseForm">

<div class="mb-3">
<label class="form-label">Category</label>
<input type="text" id="category" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Amount</label>
<input type="number" id="amount" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Date</label>
<input type="date" id="date" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Payment Mode</label>
<select id="payment_mode" class="form-control">
<option>Cash</option>
<option>UPI</option>
<option>Card</option>
<option>Net Banking</option>
</select>
</div>

<button class="btn btn-primary">Add Expense</button>

</form>

</div>

<br>

<button class="btn btn-success" onclick="loadExpenses()">
Load Expenses
</button>

<br><br>

<ul id="expenseList" class="list-group"></ul>

<br>

<a class="btn btn-dark" onclick="openDashboard()">
Open Power BI Dashboard
</a>

<br>



</div>

<script src="script.js"></script>

</body>
</html>
